<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <title>Erro de Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
        }
        
        .box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            padding: 45px;
            border-radius: 18px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
        }
        
        h1 {
            margin-top: 0;
            color: #ef4444;
        }
        
        p {
            color: #cbd5e1;
            margin-bottom: 30px;
        }
        
        a {
            display: inline-block;
            padding: 12px 22px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>Login inválido</h1>

        <p>
            O nome de utilizador ou password/NIF está incorreto.
        </p>

        <a href="{{ url_for('login') }}">
            Tentar novamente
        </a>

    </div>

</body>

</html>
